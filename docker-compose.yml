
services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - trustscore-net

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - trustscore-net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - trustscore-net
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - trustscore-net
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafana-data:

networks:
  trustscore-net:
